server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_app
    username: auth_app
    password: auth_app
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
  # OAUTH2 CONFIGURATIONS
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test-client-id}
            client-secret: ${GOOGLE_CLIENT_ID:test-client-secret}
            scope:
              - email
              - profile
              - openid


